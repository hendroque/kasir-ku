<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>License Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-gray-800">Device License Management</h1>
    
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Device Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">UUID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Check</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody id="devicesTable" class="bg-white divide-y divide-gray-200">
          <!-- Rows will be populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function fetchDevices() {
      try {
        const response = await fetch('/api/devices');
        const devices = await response.json();
        
        const tbody = document.getElementById('devicesTable');
        tbody.innerHTML = '';
        
        devices.forEach(device => {
          const isBanned = device.status === 'banned';
          const statusColor = isBanned ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800';
          const btnText = isBanned ? 'Unban' : 'Ban';
          const btnColor = isBanned ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700';
          const newStatus = isBanned ? 'active' : 'banned';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${device.id}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${device.device_name || 'Unknown'}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono text-xs">${device.device_uuid}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">
                ${device.status.toUpperCase()}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(device.last_check).toLocaleString()}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
              <button onclick="toggleBan('${device.device_uuid}', '${newStatus}')" class="${btnColor} text-white px-3 py-1 rounded text-sm transition-colors">
                ${btnText}
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error('Error fetching devices:', error);
      }
    }

    async function toggleBan(uuid, newStatus) {
      if(!confirm(\`Are you sure you want to \${newStatus === 'banned' ? 'BAN' : 'UNBAN'} this device?\`)) return;

      try {
        const response = await fetch('/api/devices/toggle-ban', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ device_uuid: uuid, status: newStatus })
        });
        
        if (response.ok) {
          fetchDevices();
        } else {
          alert('Failed to update status');
        }
      } catch (error) {
        console.error('Error updating status:', error);
        alert('Error updating status');
      }
    }

    // Load initially
    fetchDevices();
    
    // Refresh every 5 seconds
    setInterval(fetchDevices, 5000);
  </script>
</body>
</html>
